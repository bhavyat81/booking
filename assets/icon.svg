<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background circle -->
  <rect width="256" height="256" rx="48" fill="#1A237E"/>
  <!-- Car icon -->
  <g transform="translate(28, 80)">
    <!-- Car body -->
    <rect x="10" y="60" width="180" height="60" rx="10" fill="#FF6F00"/>
    <!-- Car roof -->
    <polygon points="40,60 60,20 140,20 160,60" fill="#FF8F00"/>
    <!-- Windows -->
    <rect x="65" y="28" width="30" height="25" rx="4" fill="#BBDEFB"/>
    <rect x="105" y="28" width="30" height="25" rx="4" fill="#BBDEFB"/>
    <!-- Wheels -->
    <circle cx="45" cy="122" r="20" fill="#212121"/>
    <circle cx="45" cy="122" r="10" fill="#757575"/>
    <circle cx="155" cy="122" r="20" fill="#212121"/>
    <circle cx="155" cy="122" r="10" fill="#757575"/>
  </g>
  <!-- Route text -->
  <text x="128" y="210" font-family="Arial,sans-serif" font-size="22" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle">W ↔ T</text>
</svg>
